spring.application.name=api-gateway
server.port=8181

eureka.client.serviceUrl.defaultZone=http://eureka:password@discovery-server:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=book-catalog-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://book-catalog-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/book/**

spring.cloud.gateway.server.webflux.routes[1].id=loan-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://loan-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/loan/**

spring.cloud.gateway.server.webflux.routes[2].id=discovery-server
spring.cloud.gateway.server.webflux.routes[2].uri=http://discovery-server:8761
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/eureka/web
spring.cloud.gateway.server.webflux.routes[2].filters[0]=SetPath=/

spring.cloud.gateway.server.webflux.routes[3].id=discovery-server-static
spring.cloud.gateway.server.webflux.routes[3].uri=http://discovery-server:8761
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/eureka/**

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/booknest-realm/protocol/openid-connect/certs

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoints.web.base-path=/actuator
